<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Industrias NORM Scanner PRO</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#030507;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    color:white;
}

/* VIDEO */

video{

    position:fixed;
    inset:0;

    width:100vw;
    height:100vh;

    object-fit:cover;

    z-index:1;

}

/* OVERLAY */

.overlay{

    position:fixed;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.75),
        rgba(0,0,0,.15),
        rgba(0,0,0,.75)
    );

    z-index:5;

}

/* SCAN BOX */

.scan-box{

    position:fixed;

    width:82vw;
    height:30vh;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    border-radius:24px;

    border:2px solid rgba(0,255,200,.25);

    box-shadow:
    0 0 40px rgba(0,255,200,.12),
    inset 0 0 25px rgba(0,255,200,.08);

    overflow:hidden;

    z-index:10;

}

/* CORNERS */

.corner{

    position:absolute;
    width:45px;
    height:45px;

}

.tl{
    top:0;
    left:0;
    border-top:5px solid #00ffd0;
    border-left:5px solid #00ffd0;
}

.tr{
    top:0;
    right:0;
    border-top:5px solid #00ffd0;
    border-right:5px solid #00ffd0;
}

.bl{
    bottom:0;
    left:0;
    border-bottom:5px solid #00ffd0;
    border-left:5px solid #00ffd0;
}

.br{
    bottom:0;
    right:0;
    border-bottom:5px solid #00ffd0;
    border-right:5px solid #00ffd0;
}

/* LASER */

.laser{

    position:absolute;

    width:100%;
    height:3px;

    background:
    linear-gradient(
        90deg,
        transparent,
        #00ffd0,
        white,
        #00ffd0,
        transparent
    );

    box-shadow:
    0 0 15px #00ffd0,
    0 0 35px #00ffd0;

    animation:scan 2s linear infinite;

}

@keyframes scan{

    0%{
        top:0%;
    }

    50%{
        top:96%;
    }

    100%{
        top:0%;
    }

}

/* TOP BAR */

.topbar{

    position:fixed;

    top:0;
    left:0;
    right:0;

    height:80px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 25px;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.8),
        transparent
    );

    z-index:50;

}

.title{

    font-size:22px;
    font-weight:700;
    letter-spacing:2px;

    color:#00ffd0;

    text-shadow:
    0 0 10px #00ffd0;

}

.status{

    font-size:14px;
    color:#9effea;

}

/* FOOTER */

.footer{

    position:fixed;

    bottom:40px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(0,0,0,.45);

    padding:18px 28px;

    border-radius:18px;

    backdrop-filter:blur(12px);

    border:1px solid rgba(0,255,200,.15);

    z-index:50;

    text-align:center;

}

.footer h2{

    color:#00ffd0;
    font-size:18px;
    margin-bottom:6px;

}

.footer p{

    color:#d0d0d0;
    font-size:14px;

}

/* RESULT */

#resultBox{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.9);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;

}

.card{

    width:90%;
    max-width:500px;

    background:#0d141b;

    border-radius:24px;

    padding:35px;

    border:1px solid rgba(0,255,200,.2);

    text-align:center;

    box-shadow:
    0 0 40px rgba(0,255,200,.15);

}

.card h1{

    color:#00ffd0;
    margin-bottom:25px;

}

#codigo{

    width:100%;

    padding:18px;

    border-radius:14px;

    border:none;

    background:#04070a;

    color:white;

    text-align:center;

    font-size:24px;

    margin-bottom:20px;

}

.btn{

    width:100%;

    padding:18px;

    border:none;

    border-radius:14px;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    margin-top:12px;

    transition:.2s;

}

.btn-main{

    background:#00ffd0;
    color:#041010;

}

.btn-back{

    background:#1b2630;
    color:white;

}

.btn:hover{

    transform:scale(1.02);

}

</style>

</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="overlay"></div>

<div class="topbar">

    <div class="title">
        INDUSTRIAS NORM
    </div>

    <div class="status">
        ESCÁNER LISTO
    </div>

</div>

<div class="scan-box">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="laser"></div>

</div>

<div class="footer">

    <h2>ESCANEA EL CÓDIGO</h2>

    <p>
        Mantén el código dentro del área iluminada
    </p>

</div>

<div id="resultBox">

    <div class="card">

        <h1>CÓDIGO DETECTADO</h1>

        <input
            type="text"
            id="codigo"
            readonly
        >

        <button
            class="btn btn-main"
            onclick="copiarCodigo()"
        >
            COPIAR CÓDIGO
        </button>

        <button
            class="btn btn-back"
            onclick="volverFM()"
        >
            REGRESAR A FILEMAKER
        </button>

    </div>

</div>

<script>

const codeReader =
new ZXing.BrowserMultiFormatReader();

const video =
document.getElementById('video');

let ultimoCodigo = "";
let confirmaciones = 0;
let bloqueado = false;

async function iniciarScanner(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:"environment",
                width:{ideal:1920},
                height:{ideal:1080},
                focusMode:"continuous"
            },

            audio:false

        });

        video.srcObject = stream;

        codeReader.decodeFromVideoDevice(
            null,
            'video',
            (result, err) => {

                if(bloqueado) return;

                if(result){

                    let codigo =
                    result.getText();

                    /* VALIDACION DOBLE */

                    if(codigo === ultimoCodigo){

                        confirmaciones++;

                    }else{

                        ultimoCodigo = codigo;
                        confirmaciones = 1;

                    }

                    /* NECESITA LEERSE 2 VECES */

                    if(confirmaciones >= 2){

                        bloqueado = true;

                        detectarCodigo(codigo);

                    }

                }

            }
        );

    }catch(e){

        alert(
            "Error de cámara:\n" + e
        );

    }

}

function detectarCodigo(codigo){

    navigator.vibrate(200);

    reproducirBeep();

    window.location.href =
    "fmp://$/ProduccionR?script=RECIBE_CODIGO&param=" +
    encodeURIComponent(codigo);
}

function copiarCodigo(){
    let codigo =
    document.getElementById(
        "codigo"
    ).value;
    navigator.clipboard.writeText(codigo);
    alert("Código copiado");
}

function volverFM(){
    history.back();
}

function reproducirBeep(){
    let audioCtx =
    new(window.AudioContext ||
    window.webkitAudioContext)();

    let oscillator =
    audioCtx.createOscillator();

    let gainNode =
    audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(
        audioCtx.destination
    );
    oscillator.frequency.value = 1200;
    oscillator.type = "sine";
    gainNode.gain.value = 0.1;
    oscillator.start();
    setTimeout(() => {

        oscillator.stop();

    },120);

}

iniciarScanner();

</script>

</body>

</html>
