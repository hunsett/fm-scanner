<script>

const codeReader =
new ZXing.BrowserMultiFormatReader();

const video =
document.getElementById('video');

let ultimoCodigo = "";
let confirmaciones = 0;
let bloqueado = false;

async function iniciarScanner(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:"environment",
                width:{ideal:1920},
                height:{ideal:1080},
                focusMode:"continuous"
            },

            audio:false

        });

        video.srcObject = stream;

        codeReader.decodeFromVideoDevice(
            null,
            'video',
            (result, err) => {

                if(bloqueado) return;

                if(result){

                    let codigo =
                    result.getText();

                    /* VALIDACION DOBLE */

                    if(codigo === ultimoCodigo){

                        confirmaciones++;

                    }else{

                        ultimoCodigo = codigo;
                        confirmaciones = 1;

                    }

                    /* NECESITA LEERSE 2 VECES */

                    if(confirmaciones >= 2){

                        bloqueado = true;

                        detectarCodigo(codigo);

                    }

                }

            }
        );

    }catch(e){

        alert(
            "Error de cámara:\n" + e
        );

    }

}

function detectarCodigo(codigo){

    navigator.vibrate(200);

    reproducirBeep();

    /* GUARDAR CODIGO */

    localStorage.setItem(
        "ultimoCodigo",
        codigo
    );

    /* MOSTRAR */

    document.getElementById(
        "codigo"
    ).value = codigo;

    document.getElementById(
        "resultBox"
    ).style.display = "flex";

    /* REDIRECCION AUTOMATICA */

    setTimeout(() => {

        window.location.href =
        "latest.html";

    },1500);

}

function copiarCodigo(){

    let codigo =
    document.getElementById(
        "codigo"
    ).value;

    navigator.clipboard.writeText(codigo);

    alert("Código copiado");

}

function volverFM(){

    history.back();

}

function reproducirBeep(){

    let audioCtx =
    new(window.AudioContext ||
    window.webkitAudioContext)();

    let oscillator =
    audioCtx.createOscillator();

    let gainNode =
    audioCtx.createGain();

    oscillator.connect(gainNode);

    gainNode.connect(
        audioCtx.destination
    );

    oscillator.frequency.value = 1200;

    oscillator.type = "sine";

    gainNode.gain.value = 0.1;

    oscillator.start();

    setTimeout(() => {

        oscillator.stop();

    },120);

}

iniciarScanner();

</script>
