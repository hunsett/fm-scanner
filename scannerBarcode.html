<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Scanner FM13</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

#scanner{
    width:100vw;
    height:100vh;
}

#linea{
    position:fixed;
    top:50%;
    left:10%;
    width:80%;
    height:3px;
    background:red;
    z-index:999;
}

#resultado{

    position:fixed;
    bottom:0;
    left:0;
    right:0;

    background:white;

    padding:20px;

    z-index:9999;

    display:none;

    text-align:center;

}

#codigo{

    width:95%;
    font-size:28px;
    text-align:center;
    padding:10px;

}

button{

    width:95%;
    padding:20px;
    font-size:24px;
    margin-top:15px;

}

</style>

</head>

<body>

<div id="linea"></div>

<div id="scanner"></div>

<div id="resultado">

    <h2>Código Detectado</h2>

    <input
        type="text"
        id="codigo"
        readonly
    >

    <button onclick="copiarCodigo()">
        COPIAR CÓDIGO
    </button>

    <button onclick="volverFM()">
        REGRESAR A FILEMAKER
    </button>

</div>

<script>

let detectado = false;

Quagga.init({

    inputStream : {

        name : "Live",
        type : "LiveStream",

        target: document.querySelector('#scanner'),

        constraints: {

            facingMode: "environment",
            width: 1280,
            height: 720

        }

    },

    locator: {

        patchSize: "medium",
        halfSample: true

    },

    numOfWorkers: 2,

    decoder : {

        readers : [

            "code_128_reader",
            "ean_reader",
            "ean_8_reader",
            "code_39_reader",
            "upc_reader"

        ]

    },

    locate: true

}, function(err) {

    if (err) {

        alert(err);
        return;

    }

    Quagga.start();

});

Quagga.onDetected(function(result) {

    if(detectado) return;

    detectado = true;

    let codigo = result.codeResult.code;

    Quagga.stop();

    document.getElementById(
        'resultado'
    ).style.display = 'block';

    document.getElementById(
        'codigo'
    ).value = codigo;

    document.getElementById(
        'codigo'
    ).select();

    copiarCodigo();

});

function copiarCodigo(){

    let input =
    document.getElementById('codigo');

    input.select();

    input.setSelectionRange(
        0,
        99999
    );

    navigator.clipboard.writeText(
        input.value
    );

    alert(
        "Código copiado:\n\n" +
        input.value
    );

}

function volverFM(){

    history.back();

}

</script>

</body>

</html>
